services:
  backend:
    build:
      context: ./backend
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    cap_add:
      - NET_RAW
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.6.0
    command: tunnel --protocol http2 --no-autoupdate run --token ${CLOUDFLARED_TOKEN:?Set CLOUDFLARED_TOKEN in .env}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
